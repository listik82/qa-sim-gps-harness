plugins { id 'com.android.application' }
android {
    namespace 'com.qa.simgps'
    compileSdk 34
    defaultConfig {
        applicationId "com.qa.simgps"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
dependencies {
    // Xposed API: provided-only, never bundled into the APK
    compileOnly 'de.robv.android.xposed:api:82'
}
